version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: caretrack_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caretrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caretrack}
      POSTGRES_DB: ${POSTGRES_DB:-caretrack_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caretrack} -d ${POSTGRES_DB:-caretrack_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caretrack_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-caretrack}:${POSTGRES_PASSWORD:-caretrack}@db:5432/${POSTGRES_DB:-caretrack_db}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:80","http://localhost","http://frontend:80"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        python seed_data.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000/api/v1
    container_name: caretrack_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
